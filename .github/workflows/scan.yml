name: build
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'public.ecr.aws/mycfsg/cypress:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'public.ecr.aws/mycfsg/cypress:15.13.0_chrome-145.0.7632.159-1_node-20.18.1'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true

    
